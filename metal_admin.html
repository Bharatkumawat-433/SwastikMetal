<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Prices - Admin</title>
    <link rel="stylesheet" href="metal_styles.css"> </head>
<body>
    <div class="container">
        <h1>Enter/Edit Metal Prices (Admin)</h1>
        <form id="metalForm">
            <input type="hidden" name="recordId" id="recordId" value="">

            <div class="input-group">
                <label for="b1">Full Name:</label>
                <input type="text" id="b1" name="userName" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                 <label for="b2">Metal Name:</label>
                 <input id="b2" name="metalName" type="text" required>
            </div>
            <div class="input-group">
                 <label for="b3">Price Rs.:</label>
                 <input id="b3" name="price" type="number" required step="0.01">
            </div>
             <div class="input-group">
                 <label for="b4">City:</label>
                 <input id="b4" name="city" type="text" required>
            </div>

            <button type="submit" id="submitButton">Submit</button>
            <p id="statusMessage" class="status-message"></p>
        </form>

        <h2>Current Metal Prices</h2>
        <table>
            <thead>
                <tr>
                    <th>Your Name</th>
                    <th>Metal Name</th>
                    <th>Price Rs.</th>
                    <th>City</th>
                    <th>Actions</th> </tr>
            </thead>
            <tbody id="metalTableBody">
                 <tr><td colspan="5" style="text-align:center;">Loading data...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="metal_admin.js"></script> </body>
</html>
